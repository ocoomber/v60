<title>V60 Brew Timer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #1D9E75;
    --green-dark: #0F6E56;
    --green-light: #E1F5EE;
    --green-mid: #9FE1CB;
    --green-teal: #5DCAA5;
    --bg: #ffffff;
    --bg2: #f5f5f3;
    --bg3: #eeede9;
    --text: #1a1a18;
    --text2: #6b6b67;
    --text3: #9b9b97;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --radius: 10px;
    --radius-lg: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #252523;
      --bg3: #2e2e2b;
      --text: #f0f0ec;
      --text2: #a0a09a;
      --text3: #707068;
      --border: rgba(255,255,255,0.12);
      --border2: rgba(255,255,255,0.22);
      --green-light: #0a3d2a;
      --green-mid: #0d5238;
    }
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg3);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 16px 48px;
  }
  .app {
    width: 100%;
    max-width: 420px;
    background: var(--bg);
    border-radius: 20px;
    padding: 24px 20px;
    box-shadow: 0 2px 24px rgba(0,0,0,0.08);
  }
  .screen { display: none; }
  .screen.active { display: block; }
  .app-header { display: flex; align-items: center; justify-content: space-between; margin: 0 0 24px; }
  .app-title { font-size: 18px; font-weight: 600; color: var(--text); }
  .icon-btn { background: none; border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 7px 12px; cursor: pointer; color: var(--text2); font-size: 13px; }
  .icon-btn:hover { background: var(--bg2); }
  .group { margin: 0 0 20px; }
  .group-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin: 0 0 10px; display: block; }
  .seg { display: flex; border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .seg-btn { flex: 1; padding: 10px 0; background: none; border: none; border-right: 0.5px solid var(--border); font-size: 14px; cursor: pointer; color: var(--text2); transition: all 0.15s; }
  .seg-btn:last-child { border-right: none; }
  .seg-btn.sel { background: var(--green); color: #fff; font-weight: 600; }
  .seg-btn:not(.sel):hover { background: var(--bg2); }
  .stepper { display: flex; align-items: center; gap: 12px; background: var(--bg2); border-radius: var(--radius); padding: 10px 14px; }
  .step-val { font-size: 22px; font-weight: 600; color: var(--text); min-width: 52px; text-align: center; }
  .step-btn { width: 36px; height: 36px; border-radius: 50%; border: 0.5px solid var(--border2); background: var(--bg); font-size: 20px; cursor: pointer; color: var(--text); display: flex; align-items: center; justify-content: center; }
  .step-btn:hover { background: var(--bg3); }
  .summary { background: var(--bg2); border-radius: var(--radius-lg); padding: 14px 16px; margin: 0 0 14px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .sum-item { text-align: center; }
  .sum-val { font-size: 20px; font-weight: 600; color: var(--text); }
  .sum-lbl { font-size: 11px; color: var(--text3); margin-top: 3px; }
  .temp-note { font-size: 13px; color: var(--text2); background: var(--bg2); border-radius: var(--radius); padding: 10px 14px; margin: 0 0 20px; border-left: 3px solid var(--green); line-height: 1.5; }
  .btn-go { background: var(--green); border: none; border-radius: var(--radius-lg); color: #fff; font-size: 16px; font-weight: 600; padding: 14px; cursor: pointer; width: 100%; transition: background 0.15s; }
  .btn-go:hover { background: var(--green-dark); }
  .btn-secondary { background: none; border: 0.5px solid var(--border2); border-radius: var(--radius); font-size: 14px; padding: 10px 20px; cursor: pointer; color: var(--text2); transition: background 0.15s; }
  .btn-secondary:hover { background: var(--bg2); }
  .status-bar { display: flex; gap: 8px; margin: 0 0 16px; }
  .pill { font-size: 11px; padding: 4px 10px; border-radius: 20px; background: var(--bg2); color: var(--text3); border: 0.5px solid var(--border); transition: all 0.3s; }
  .pill.on { background: var(--green-light); color: var(--green-dark); border-color: var(--green-mid); }
  .ring-outer { position: relative; width: 200px; height: 200px; margin: 0 auto 8px; }
  .ring-svg { width: 200px; height: 200px; transform: rotate(-90deg); }
  .ring-track { fill: none; stroke: var(--bg3); stroke-width: 6; }
  .ring-fill { fill: none; stroke: var(--green-teal); stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
  .ring-fill.done-ring { stroke: var(--green); }
  .ring-inner { position: absolute; top: 0; left: 0; width: 200px; height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .clock { font-size: 58px; font-weight: 300; font-variant-numeric: tabular-nums; color: var(--text); line-height: 1; letter-spacing: -2px; transition: color 0.3s; }
  .clock.running { color: var(--green); }
  .clock.done-c { color: var(--text3); }
  .phase { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; margin-bottom: 16px; text-align: center; }
  .prompt-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px; margin: 0 0 12px; min-height: 88px; transition: border-color 0.3s; }
  .prompt-action { font-size: 20px; font-weight: 600; color: var(--text); margin: 0 0 6px; }
  .prompt-detail { font-size: 14px; color: var(--text2); line-height: 1.6; }
  .water-wrap { margin: 0 0 16px; }
  .water-lbl { font-size: 12px; color: var(--text3); margin: 0 0 6px; }
  .water-bar { height: 6px; border-radius: 3px; background: var(--bg3); overflow: hidden; }
  .water-fill { height: 100%; background: var(--green-teal); border-radius: 3px; transition: width 1s linear; }
  .upcoming { margin: 0 0 20px; }
  .up-title { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin: 0 0 8px; }
  .up-row { display: flex; gap: 8px; }
  .up-item { flex: 1; background: var(--bg2); border-radius: var(--radius); padding: 8px 10px; }
  .up-time { font-size: 11px; font-variant-numeric: tabular-nums; color: var(--text2); }
  .up-name { font-size: 12px; color: var(--text); font-weight: 500; margin-top: 2px; }
  .brew-actions { display: flex; gap: 10px; }
  .brew-actions .btn-go { flex: 1; }
  .flash { animation: fl 0.6s ease; }
  @keyframes fl { 0%,100% { border-color: var(--green); } 50% { border-color: var(--green-teal); box-shadow: 0 0 0 3px var(--green-light); } }
</style>
</head>
<body>
<div class="app">

  <!-- Settings screen -->
  <div class="screen active" id="screenSettings">
    <div class="app-header"><span class="app-title">V60</span></div>
    <div class="group"><span class="group-label">Roast</span>
      <div class="seg" id="roastSeg">
        <button class="seg-btn" data-val="light" onclick="setRoast('light')">Light</button>
        <button class="seg-btn" data-val="medium" onclick="setRoast('medium')">Medium</button>
        <button class="seg-btn" data-val="dark" onclick="setRoast('dark')">Dark</button>
      </div>
    </div>
    <div class="group"><span class="group-label">Dose</span>
      <div class="stepper">
        <button class="step-btn" onclick="adjustDose(-1)">−</button>
        <span class="step-val" id="doseVal">13g</span>
        <button class="step-btn" onclick="adjustDose(1)">+</button>
      </div>
    </div>
    <div class="group"><span class="group-label">Ratio (water : coffee)</span>
      <div class="seg" id="ratioSeg">
        <button class="seg-btn" data-val="15" onclick="setRatio(15)">15:1</button>
        <button class="seg-btn" data-val="16" onclick="setRatio(16)">16:1</button>
        <button class="seg-btn" data-val="17" onclick="setRatio(17)">17:1</button>
      </div>
    </div>
    <div class="summary" id="summaryCard"></div>
    <div class="temp-note" id="tempNote"></div>
    <button class="btn-go" onclick="startBrew()">Start brew</button>
  </div>

  <!-- Brew screen -->
  <div class="screen" id="screenBrew">
    <div class="app-header">
      <span class="app-title">Brewing</span>
      <button class="icon-btn" onclick="backToSettings()">Settings</button>
    </div>
    <div class="status-bar">
      <span class="pill" id="pillWake">Screen always on</span>
      <span class="pill" id="pillSound">Sound ready</span>
    </div>
    <div class="ring-outer">
      <svg class="ring-svg" viewBox="0 0 200 200">
        <circle class="ring-track" cx="100" cy="100" r="88"/>
        <circle class="ring-fill" id="ringFill" cx="100" cy="100" r="88"
          stroke-dasharray="552.9" stroke-dashoffset="552.9"/>
      </svg>
      <div class="ring-inner">
        <div class="clock" id="clock">0:00</div>
        <div class="phase" id="phaseLbl">Ready</div>
      </div>
    </div>
    <div class="prompt-card" id="promptCard">
      <div class="prompt-action" id="promptAction">Ready to brew</div>
      <div class="prompt-detail" id="promptDetail"></div>
    </div>
    <div class="water-wrap" id="waterSection" style="display:none">
      <div class="water-lbl" id="waterLbl"></div>
      <div class="water-bar"><div class="water-fill" id="waterFill" style="width:0%"></div></div>
    </div>
    <div class="upcoming" id="upcomingSection">
      <div class="up-title">Coming up</div>
      <div class="up-row" id="upRow"></div>
    </div>
    <div class="brew-actions">
      <button class="btn-go" id="brewBtn" onclick="handleBrewBtn()">Start</button>
      <button class="btn-secondary" onclick="backToSettings()">Done</button>
    </div>
  </div>

</div>

<script>
const ROAST_TEMPS = { light:'94–96°C', medium:'92–94°C', dark:'88–91°C' };
const ROAST_NOTES = { light:'Light roasts need higher temp to fully extract sweetness.', medium:'A balanced temperature for most single origins.', dark:'Lower temp prevents bitterness from over-extracting dark roasts.' };
const STORAGE_KEY = 'v60-settings';

let settings = { dose:13, ratio:16, roast:'medium' };
let elapsed=0, interval=null, started=false, finished=false, currentCue=0, cues=[];
let noSleep=null, audioCtx=null;

function loadSettings() {
  try { const s = localStorage.getItem(STORAGE_KEY); if(s) settings = JSON.parse(s); } catch(e) {}
  applySettings();
}
function saveSettings() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(settings)); } catch(e) {}
}
function applySettings() {
  document.getElementById('doseVal').textContent = settings.dose + 'g';
  document.querySelectorAll('#roastSeg .seg-btn').forEach(b => b.classList.toggle('sel', b.dataset.val === settings.roast));
  document.querySelectorAll('#ratioSeg .seg-btn').forEach(b => b.classList.toggle('sel', b.dataset.val == settings.ratio));
  updateSummary();
}
function updateSummary() {
  const total = Math.round(settings.dose * settings.ratio);
  document.getElementById('summaryCard').innerHTML = `
    <div class="sum-item"><div class="sum-val">${settings.dose}g</div><div class="sum-lbl">Coffee</div></div>
    <div class="sum-item"><div class="sum-val">${total}g</div><div class="sum-lbl">Water</div></div>
    <div class="sum-item"><div class="sum-val">${ROAST_TEMPS[settings.roast]}</div><div class="sum-lbl">Temp</div></div>`;
  document.getElementById('tempNote').textContent = ROAST_NOTES[settings.roast];
}
function setRoast(v) { settings.roast=v; saveSettings(); applySettings(); }
function setRatio(v) { settings.ratio=v; saveSettings(); applySettings(); }
function adjustDose(d) { settings.dose=Math.max(8,Math.min(30,settings.dose+d)); saveSettings(); applySettings(); }

function buildCues() {
  const total = Math.round(settings.dose * settings.ratio);
  const bloom = Math.round(settings.dose * 2);
  const p1 = Math.round(total * 0.52);
  const p2 = Math.round(total * 0.80);
  return [
    { at:0,   action:`Pour bloom — ${bloom}g`,       detail:'Pour evenly over the grounds to saturate fully. Then wait.',           water:bloom, phase:'Bloom' },
    { at:45,  action:`First pour — up to ${p1}g`,    detail:'Slow spiral from centre outward. Keep it steady.',                    water:p1,    phase:'First pour' },
    { at:75,  action:`Second pour — up to ${p2}g`,   detail:`Same spiral pattern, bring total to ${p2}g.`,                        water:p2,    phase:'Second pour' },
    { at:105, action:`Final pour — ${total}g total`, detail:`Pour remaining water to ${total}g. Don't let the bed run dry.`,       water:total, phase:'Final pour' },
    { at:180, action:'Almost there',                  detail:'Target finish: 3:00–3:30. Watch the draw down.',                     water:total, phase:'Draw down' },
    { at:210, action:'Done — enjoy',                  detail:'Total brew time in range. Grind finer if fast, coarser if slow.',    water:total, phase:'Done' }
  ];
}

function fmt(s) { return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0'); }
function getCueIdx(t) { let i=0; for(let j=0;j<cues.length;j++){ if(t>=cues[j].at) i=j; } return i; }

function updateRing(t) {
  const circ = 552.9;
  const idx = getCueIdx(t);
  const start = cues[idx].at;
  const end = idx < cues.length - 1 ? cues[idx + 1].at : start + 1;
  const duration = end - start;
  const progress = duration > 0 ? Math.min(1, (t - start) / duration) : 1;
  const offset = circ * (1 - progress);
  const ring = document.getElementById('ringFill');
  if(ring) {
    ring.style.strokeDashoffset = offset;
    ring.classList.toggle('done-ring', idx === cues.length - 1);
  }
}

function beep(type) {
  try {
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    const ctx=audioCtx, osc=ctx.createOscillator(), gain=ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    if(type==='done') {
      osc.frequency.setValueAtTime(660, ctx.currentTime);
      osc.frequency.setValueAtTime(880, ctx.currentTime+0.12);
      gain.gain.setValueAtTime(0.18, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.5);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime+0.5);
    } else {
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.3);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime+0.3);
    }
    setPillOn('pillSound', true);
  } catch(e) {}
}

async function acquireWakeLock() {
  try {
    if(!noSleep) noSleep = new NoSleep();
    await noSleep.enable();
    setPillOn('pillWake', true);
  } catch(e) {
    document.getElementById('pillWake').textContent = 'Screen lock unavailable';
  }
}
function releaseWakeLock() {
  try { if(noSleep) noSleep.disable(); } catch(e) {}
  setPillOn('pillWake', false);
}
function setPillOn(id, on) { const el=document.getElementById(id); if(el) el.classList.toggle('on',on); }

function renderUpcoming(t) {
  const up = cues.filter(c=>c.at>t).slice(0,3);
  const sec = document.getElementById('upcomingSection');
  if(!up.length) { sec.style.display='none'; return; }
  sec.style.display='block';
  document.getElementById('upRow').innerHTML = up.map(c =>
    `<div class="up-item"><div class="up-time">${fmt(c.at)}</div><div class="up-name">${c.phase}</div></div>`
  ).join('');
}

function startBrew() {
  cues = buildCues();
  const total = Math.round(settings.dose*settings.ratio);
  elapsed=0; started=false; finished=false; currentCue=0;
  clearInterval(interval); releaseWakeLock();
  document.getElementById('clock').textContent='0:00';
  document.getElementById('clock').className='clock';
  const ring = document.getElementById('ringFill');
  if(ring) { ring.style.strokeDashoffset = '552.9'; ring.classList.remove('done-ring'); }
  document.getElementById('phaseLbl').textContent='Ready';
  document.getElementById('promptAction').textContent=`${settings.dose}g coffee · ${total}g water at ${ROAST_TEMPS[settings.roast]}`;
  document.getElementById('promptDetail').textContent='Filter rinsed, bed levelled. Hit start when ready.';
  document.getElementById('waterSection').style.display='none';
  document.getElementById('brewBtn').textContent='Start';
  document.getElementById('brewBtn').className='btn-go';
  document.getElementById('pillWake').textContent='Screen always on';
  document.getElementById('pillSound').textContent='Sound ready';
  setPillOn('pillWake',false); setPillOn('pillSound',false);
  renderUpcoming(-1);
  document.getElementById('screenSettings').classList.remove('active');
  document.getElementById('screenBrew').classList.add('active');
}

function tick() {
  elapsed++;
  document.getElementById('clock').textContent = fmt(elapsed);
  updateRing(elapsed);
  const total = Math.round(settings.dose*settings.ratio);
  const idx = getCueIdx(elapsed);
  if(idx !== currentCue) {
    currentCue = idx;
    const c = cues[idx];
    document.getElementById('promptAction').textContent = c.action;
    document.getElementById('promptDetail').textContent = c.detail;
    document.getElementById('phaseLbl').textContent = c.phase;
    document.getElementById('waterLbl').textContent = `Water: ${c.water}g / ${total}g`;
    document.getElementById('waterFill').style.width = Math.round((c.water/total)*100) + '%';
    const card = document.getElementById('promptCard');
    card.classList.add('flash');
    setTimeout(() => card.classList.remove('flash'), 700);
    const isDone = idx === cues.length-1;
    beep(isDone ? 'done' : 'cue');
    if(isDone) {
      clearInterval(interval); finished=true;
      document.getElementById('clock').className = 'clock done-c';
      document.getElementById('brewBtn').textContent = 'Brew again';
      document.getElementById('brewBtn').className = 'btn-secondary';
      releaseWakeLock();
    }
  }
  renderUpcoming(elapsed);
}

async function handleBrewBtn() {
  if(finished) { startBrew(); return; }
  if(!started) {
    started = true;
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    await acquireWakeLock();
    const c=cues[0], total=Math.round(settings.dose*settings.ratio);
    document.getElementById('clock').className='clock running';
    document.getElementById('promptAction').textContent=c.action;
    document.getElementById('promptDetail').textContent=c.detail;
    document.getElementById('phaseLbl').textContent=c.phase;
    document.getElementById('waterSection').style.display='block';
    document.getElementById('waterLbl').textContent=`Water: ${c.water}g / ${total}g`;
    document.getElementById('waterFill').style.width=Math.round((c.water/total)*100)+'%';
    document.getElementById('brewBtn').textContent='Reset';
    document.getElementById('brewBtn').className='btn-secondary';
    renderUpcoming(0); beep('cue');
    interval = setInterval(tick, 1000);
  } else {
    clearInterval(interval); releaseWakeLock(); startBrew();
  }
}

function backToSettings() {
  clearInterval(interval); releaseWakeLock();
  document.getElementById('screenBrew').classList.remove('active');
  document.getElementById('screenSettings').classList.add('active');
}

loadSettings();
</script>
